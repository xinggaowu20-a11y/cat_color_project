<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>猫咪毛色批量识别</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #667085;
      --line: #d7dee8;
      --panel: #ffffff;
      --canvas: #f4f7fb;
      --soft: #eef3f7;
      --teal: #11776a;
      --teal-dark: #0c5b51;
      --amber: #c98726;
      --coral: #c95643;
      --danger: #a33422;
      --shadow: 0 18px 42px rgba(24, 31, 44, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(17, 119, 106, 0.08), transparent 36%),
        linear-gradient(225deg, rgba(201, 135, 38, 0.12), transparent 34%),
        var(--canvas);
    }

    .shell {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 34px;
    }

    .appbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--amber));
      box-shadow: 0 12px 24px rgba(17, 119, 106, 0.22);
      flex: 0 0 auto;
    }

    .mark svg { width: 27px; height: 27px; }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 850;
    }

    .sub {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--amber);
      box-shadow: 0 0 0 4px rgba(201, 135, 38, 0.16);
    }

    .status.ready .dot {
      background: var(--teal);
      box-shadow: 0 0 0 4px rgba(17, 119, 106, 0.15);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, 0.86fr) minmax(0, 1.14fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .uploadPanel {
      display: grid;
      grid-template-rows: minmax(430px, auto) auto auto;
    }

    .dropZone {
      margin: 16px;
      border: 1.5px dashed #aab5c3;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(238, 243, 247, 0.94)),
        var(--soft);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      min-height: 430px;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .dropZone:hover,
    .dropZone.drag {
      border-color: var(--teal);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.80), rgba(232, 246, 242, 0.94)),
        #eaf6f3;
    }

    .dropZone:focus-visible {
      outline: 3px solid rgba(17, 119, 106, 0.25);
      outline-offset: 3px;
    }

    .dropInner {
      width: min(420px, 88%);
      text-align: center;
      padding: 28px;
    }

    .uploadIcon {
      width: 76px;
      height: 76px;
      margin: 0 auto 18px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--teal);
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 12px 28px rgba(24, 31, 44, 0.08);
    }

    .uploadIcon svg { width: 38px; height: 38px; }

    .dropTitle {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 850;
    }

    .dropText {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .previewGrid {
      display: none;
      width: 100%;
      height: 100%;
      padding: 12px;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      align-content: start;
      overflow: auto;
    }

    .dropZone.hasImages {
      place-items: stretch;
      background: #101820;
      border-style: solid;
    }

    .dropZone.hasImages .dropInner { display: none; }
    .dropZone.hasImages .previewGrid { display: grid; }

    .thumb {
      min-width: 0;
      border-radius: 8px;
      overflow: hidden;
      background: #1c2733;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: grid;
      grid-template-rows: 112px auto;
    }

    .thumb img {
      width: 100%;
      height: 112px;
      object-fit: cover;
      display: block;
    }

    .thumbName {
      min-height: 34px;
      padding: 8px;
      color: #d9e3ef;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px 16px;
    }

    .sourcePanel {
      display: grid;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .sourceLabel {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .sourceRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .sourceInput {
      min-width: 0;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 14px;
      font-size: 14px;
      color: var(--ink);
      background: #fff;
    }

    .sourceInput:focus-visible {
      outline: 3px solid rgba(17, 119, 106, 0.18);
      outline-offset: 2px;
      border-color: var(--teal);
    }

    .fileMeta {
      min-width: 0;
      color: var(--muted);
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .srFile {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 7px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 850;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, opacity 140ms ease;
    }

    button:active { transform: translateY(1px); }

    .secondary {
      color: var(--ink);
      background: #e8eef4;
    }

    .secondary:hover { background: #dce6ee; }

    .ghost {
      color: #5a6678;
      background: transparent;
      border: 1px solid var(--line);
    }

    .ghost:hover { background: #f3f6f9; }

    .primary {
      min-width: 120px;
      color: #fff;
      background: var(--teal);
    }

    .primary:hover { background: var(--teal-dark); }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    .classRail {
      border-top: 1px solid var(--line);
      padding: 14px 16px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: #fbfcfe;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid #dfe5ec;
      border-radius: 999px;
      background: #fff;
      color: #4d596b;
      font-size: 12px;
      white-space: nowrap;
    }

    .swatch {
      width: 13px;
      height: 13px;
      border-radius: 999px;
      border: 1px solid rgba(17, 24, 39, 0.18);
      background: #ccd5df;
      flex: 0 0 auto;
    }

    .resultPanel {
      min-height: 620px;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .resultHead {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .resultHead h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }

    .batchSummary {
      margin: 18px 20px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbfa;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .thresholdPanel {
      margin: 14px 20px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .thresholdMeta {
      min-width: 0;
    }

    .thresholdLabel {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .thresholdNote {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.5;
    }

    .thresholdControls {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .thresholdInput {
      width: 100px;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      background: #fff;
    }

    .thresholdInput:focus-visible {
      outline: 3px solid rgba(17, 119, 106, 0.18);
      outline-offset: 2px;
      border-color: var(--teal);
    }

    .metric {
      min-width: 0;
    }

    .metricLabel {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .metricValue {
      font-size: 20px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .resultList {
      padding: 18px 20px 20px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .emptyState {
      min-height: 360px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
      background: #fbfcfe;
    }

    .resultCard {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      min-height: 142px;
    }

    .resultImage {
      width: 132px;
      height: 100%;
      min-height: 142px;
      object-fit: cover;
      background: #101820;
    }

    .resultBody {
      min-width: 0;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .resultTop {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .fileName {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .winnerName {
      margin-top: 4px;
      font-size: 24px;
      line-height: 1.15;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .winnerCode {
      margin-top: 5px;
      color: #6b7485;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .scorePill {
      border-radius: 999px;
      padding: 6px 10px;
      color: #fff;
      background: var(--teal);
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
    }

    .bars {
      display: grid;
      gap: 9px;
    }

    .barRow {
      display: grid;
      gap: 6px;
    }

    .barTop {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      color: #4f5b6f;
      font-size: 13px;
    }

    .barName {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .barPct {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .barTrack {
      height: 10px;
      border-radius: 999px;
      background: #e6ebf1;
      overflow: hidden;
    }

    .barFill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--amber));
      transition: width 280ms ease;
    }

    .message {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .error { color: var(--danger); font-weight: 850; }

    @media (max-width: 940px) {
      .shell {
        width: min(100% - 22px, 1240px);
        padding: 16px 0 24px;
      }

      .appbar {
        align-items: stretch;
        flex-direction: column;
      }

      h1 { font-size: 30px; }

      .workspace { grid-template-columns: 1fr; }

      .dropZone {
        min-height: 330px;
        margin: 12px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
        padding: 0 12px 12px;
      }

      .sourcePanel {
        padding: 0 12px 12px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
      }

      .batchSummary {
        grid-template-columns: 1fr;
        margin: 14px 14px 0;
      }

      .thresholdPanel {
        margin: 14px 14px 0;
        align-items: stretch;
        flex-direction: column;
      }

      .thresholdControls {
        width: 100%;
      }

      .thresholdInput,
      #thresholdSave {
        flex: 1 1 0;
      }

      .resultList { padding: 14px; }
    }

    @media (max-width: 620px) {
      .brand { align-items: flex-start; }
      .mark { width: 42px; height: 42px; }
      .actions { grid-template-columns: 1fr; }
      .sourceRow { grid-template-columns: 1fr; }
      .previewGrid { grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); }
      .thumb { grid-template-rows: 94px auto; }
      .thumb img { height: 94px; }
      .resultCard { grid-template-columns: 1fr; }
      .resultImage {
        width: 100%;
        height: 190px;
        min-height: 190px;
      }
      .winnerName { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="appbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 10.5 4 4l5 3 3-1 3 1 5-3-1 6.5c1.2 1.2 1.8 2.7 1.8 4.3 0 4-3.7 7.2-8.8 7.2S3.2 18.8 3.2 14.8c0-1.6.6-3.1 1.8-4.3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
            <path d="M8.2 14h.1M15.7 14h.1M10 17c1.2.8 2.8.8 4 0" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>猫咪毛色批量识别</h1>
          <p class="sub">一次上传多张图片，本地模型逐张返回毛色类别和 Top 3 置信度。</p>
        </div>
      </div>
      <div class="status" id="status"><span class="dot"></span><span>模型状态检测中</span></div>
    </header>

    <main class="workspace">
      <section class="panel uploadPanel">
        <div class="dropZone" id="drop" role="button" tabindex="0" aria-label="上传图片">
          <div class="dropInner">
            <div class="uploadIcon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 16V5m0 0 4 4m-4-4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M5 15v2.5A2.5 2.5 0 0 0 7.5 20h9a2.5 2.5 0 0 0 2.5-2.5V15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>
            <p class="dropTitle">点击上传多张猫咪图片</p>
            <p class="dropText">支持 JPG、PNG、WEBP，最多一次 50 张。</p>
          </div>
          <div class="previewGrid" id="previewGrid"></div>
        </div>

        <div class="toolbar">
          <div class="fileMeta" id="fileMeta">尚未选择图片</div>
          <div class="actions">
            <button id="choose" type="button" class="secondary">上传图片</button>
            <button id="clear" type="button" class="ghost" disabled>清空</button>
            <input id="file" class="srFile" type="file" accept="image/*" multiple>
            <button id="predict" type="button" class="primary" disabled>批量识别</button>
          </div>
        </div>

        <div class="sourcePanel">
          <div class="sourceLabel">也可以直接粘贴图片地址，服务会下载后识别。</div>
          <div class="sourceRow">
            <input
              id="imageUrl"
              class="sourceInput"
              type="url"
              inputmode="url"
              placeholder="粘贴 JPG / PNG / WEBP 图片链接"
            >
            <button id="predictUrl" type="button" class="ghost">识别链接图片</button>
          </div>
        </div>

        <div class="classRail" id="classRail"></div>
      </section>

      <section class="panel resultPanel">
        <div class="resultHead">
          <h2>识别结果</h2>
          <p class="message" id="message">选择图片后点击“批量识别”。</p>
        </div>

        <div class="batchSummary">
          <div class="metric">
            <div class="metricLabel">待识别</div>
            <div class="metricValue" id="selectedCount">0 张</div>
          </div>
          <div class="metric">
            <div class="metricLabel">已完成</div>
            <div class="metricValue" id="doneCount">0 张</div>
          </div>
          <div class="metric">
            <div class="metricLabel">平均置信度</div>
            <div class="metricValue" id="avgConfidence">--</div>
          </div>
        </div>

        <div class="thresholdPanel">
          <div class="thresholdMeta">
            <div class="thresholdLabel">判断阈值</div>
            <div class="thresholdNote" id="thresholdHint">当前阈值 0.50，低于该值显示“无法判断”</div>
          </div>
          <div class="thresholdControls">
            <input
              id="thresholdInput"
              class="thresholdInput"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.50"
            >
            <button id="thresholdSave" type="button" class="secondary">保存阈值</button>
          </div>
        </div>

        <div class="resultList" id="resultList">
          <div class="emptyState">批量结果会显示在这里。</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const META = {
      Black: { label: "黑猫", swatch: "#111827" },
      Black_White: { label: "黑白猫", swatch: "linear-gradient(135deg,#111827 0 50%,#f7f7f2 50% 100%)" },
      Calico: { label: "三花猫", swatch: "linear-gradient(135deg,#f7f7f2 0 33%,#c9762a 33% 66%,#202124 66% 100%)" },
      Colorpoint: { label: "重点色猫", swatch: "linear-gradient(135deg,#ead8bf 0 55%,#5a4337 55% 100%)" },
      Gray: { label: "灰猫", swatch: "#6e7f91" },
      Gray_White: { label: "灰白猫", swatch: "linear-gradient(135deg,#6e7f91 0 50%,#f7f7f2 50% 100%)" },
      Orange: { label: "橘猫", swatch: "#d8892d" },
      Other_Color: { label: "其他花色", swatch: "linear-gradient(135deg,#7f8ea3,#b58c72)" },
      Shaded_Golden: { label: "金渐层", swatch: "linear-gradient(135deg,#f3d58a,#9b6d22)" },
      Shaded_Silver: { label: "银渐层", swatch: "linear-gradient(135deg,#f2f4f7,#8a96a3)" },
      Tortoiseshell: { label: "玳瑁猫", swatch: "linear-gradient(135deg,#211816 0 35%,#a85c28 35% 70%,#6a3f22 70% 100%)" },
      White: { label: "白猫", swatch: "#f7f7f2" },
      Unknown: { label: "无法判断", swatch: "linear-gradient(135deg,#9aa6b2,#d6dde6)" }
    };

    const fileInput = document.querySelector("#file");
    const chooseButton = document.querySelector("#choose");
    const clearButton = document.querySelector("#clear");
    const predictButton = document.querySelector("#predict");
    const imageUrlInput = document.querySelector("#imageUrl");
    const predictUrlButton = document.querySelector("#predictUrl");
    const previewGrid = document.querySelector("#previewGrid");
    const drop = document.querySelector("#drop");
    const fileMeta = document.querySelector("#fileMeta");
    const resultList = document.querySelector("#resultList");
    const message = document.querySelector("#message");
    const statusBox = document.querySelector("#status");
    const classRail = document.querySelector("#classRail");
    const selectedCount = document.querySelector("#selectedCount");
    const doneCount = document.querySelector("#doneCount");
    const avgConfidence = document.querySelector("#avgConfidence");
    const thresholdInput = document.querySelector("#thresholdInput");
    const thresholdSave = document.querySelector("#thresholdSave");
    const thresholdHint = document.querySelector("#thresholdHint");

    let selectedFiles = [];
    let previewUrls = [];
    let healthSnapshot = null;

    function formatPct(value) {
      return `${(value * 100).toFixed(2)}%`;
    }

    function formatThreshold(value) {
      return Number(value).toFixed(2);
    }

    function normalizeImageUrl(value) {
      return String(value || "").trim();
    }

    function metaFor(name) {
      return META[name] || { label: name.replaceAll("_", " "), swatch: "#ccd5df" };
    }

    function describePrediction(prediction) {
      if (prediction.is_uncertain) {
        const rawMeta = metaFor(prediction.raw_class_name);
        return {
          label: "无法判断",
          code: `最高候选：${rawMeta.label} · ${prediction.raw_class_name}`,
          swatch: metaFor("Unknown").swatch
        };
      }

      const topMeta = metaFor(prediction.class_name);
      return {
        label: topMeta.label,
        code: prediction.class_name,
        swatch: topMeta.swatch
      };
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderClassRail() {
      classRail.innerHTML = Object.entries(META).map(([name, item]) => `
        <span class="chip" title="${escapeHtml(name)}">
          <span class="swatch" style="background:${item.swatch}"></span>
          ${escapeHtml(item.label)}
        </span>
      `).join("");
    }

    function updateThresholdUi(value) {
      const normalized = Number(value);
      if (!Number.isFinite(normalized)) {
        return;
      }

      thresholdInput.value = formatThreshold(normalized);
      thresholdHint.textContent = `当前阈值 ${formatThreshold(normalized)}，低于该值显示“无法判断”`;
    }

    function updateStatus(data) {
      healthSnapshot = data;
      statusBox.classList.add("ready");
      statusBox.querySelector("span:last-child").textContent =
        `模型已加载 · ${data.classes} 类 · 阈值 ${formatThreshold(data.confidence_threshold)} · ${data.device}`;
      updateThresholdUi(data.confidence_threshold);
    }

    function openPicker() {
      fileInput.value = "";
      fileInput.click();
    }

    function syncUrlButtonState() {
      predictUrlButton.disabled = !normalizeImageUrl(imageUrlInput.value);
    }

    function setBusyState(isBusy) {
      chooseButton.disabled = isBusy;
      clearButton.disabled = isBusy || !selectedFiles.length;
      predictButton.disabled = isBusy || !selectedFiles.length;
      imageUrlInput.disabled = isBusy;
      predictUrlButton.disabled = isBusy || !normalizeImageUrl(imageUrlInput.value);
      thresholdSave.disabled = isBusy;
      thresholdInput.disabled = isBusy;
    }

    function revokePreviewUrls() {
      previewUrls.forEach(url => URL.revokeObjectURL(url));
      previewUrls = [];
    }

    function resetResults() {
      doneCount.textContent = "0 张";
      avgConfidence.textContent = "--";
      resultList.innerHTML = '<div class="emptyState">批量结果会显示在这里。</div>';
    }

    function clearFiles() {
      selectedFiles = [];
      revokePreviewUrls();
      drop.classList.remove("hasImages");
      previewGrid.innerHTML = "";
      fileMeta.textContent = "尚未选择图片";
      selectedCount.textContent = "0 张";
      predictButton.disabled = true;
      clearButton.disabled = true;
      syncUrlButtonState();
      message.textContent = "选择图片后点击“批量识别”。";
      resetResults();
    }

    function setFiles(fileList) {
      const images = Array.from(fileList || []).filter(file => file.type.startsWith("image/")).slice(0, 50);
      if (!images.length) {
        message.innerHTML = "<span class='error'>请选择图片文件。</span>";
        return;
      }

      selectedFiles = images;
      revokePreviewUrls();
      previewUrls = selectedFiles.map(file => URL.createObjectURL(file));
      drop.classList.add("hasImages");
      previewGrid.innerHTML = selectedFiles.map((file, index) => `
        <div class="thumb">
          <img src="${previewUrls[index]}" alt="${escapeHtml(file.name)}">
          <div class="thumbName" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</div>
        </div>
      `).join("");

      const totalMb = selectedFiles.reduce((sum, file) => sum + file.size, 0) / 1024 / 1024;
      fileMeta.textContent = `${selectedFiles.length} 张图片 · ${totalMb.toFixed(2)} MB`;
      selectedCount.textContent = `${selectedFiles.length} 张`;
      predictButton.disabled = false;
      clearButton.disabled = false;
      syncUrlButtonState();
      message.textContent = "图片已载入，可以批量识别。";
      resetResults();
    }

    async function loadHealth() {
      try {
        const res = await fetch("/health");
        const data = await res.json();
        updateStatus(data);
      } catch {
        statusBox.querySelector("span:last-child").textContent = "模型状态暂不可用";
      }
    }

    async function saveThreshold() {
      const value = Number(thresholdInput.value);
      if (!Number.isFinite(value) || value < 0 || value > 1) {
        message.innerHTML = "<span class='error'>阈值需要是 0 到 1 之间的数字。</span>";
        return;
      }

      thresholdSave.disabled = true;
      thresholdInput.disabled = true;
      thresholdHint.textContent = "正在保存阈值...";

      try {
        const res = await fetch("/settings", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ confidence_threshold: value })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || "阈值保存失败");
        }

        const data = await res.json();
        updateThresholdUi(data.confidence_threshold);
        if (healthSnapshot) {
          updateStatus({ ...healthSnapshot, confidence_threshold: data.confidence_threshold });
        }
        message.textContent = `阈值已更新为 ${formatThreshold(data.confidence_threshold)}。重新识别后会按新阈值判断。`;
      } catch (err) {
        thresholdHint.textContent = "当前阈值保存失败，请稍后重试。";
        message.innerHTML = `<span class="error">${escapeHtml(err.message)}</span>`;
      } finally {
        setBusyState(false);
      }
    }

    function renderBars(items) {
      return items.map(item => {
        const itemMeta = metaFor(item.class_name);
        const pct = Math.max(0, Math.min(100, item.confidence * 100));
        return `
          <div class="barRow">
            <div class="barTop">
              <div class="barName">
                <span class="swatch" style="background:${itemMeta.swatch}"></span>
                <span>${escapeHtml(itemMeta.label)} · ${escapeHtml(item.class_name)}</span>
              </div>
              <span class="barPct">${formatPct(item.confidence)}</span>
            </div>
            <div class="barTrack"><div class="barFill" style="width:${pct}%"></div></div>
          </div>
        `;
      }).join("");
    }

    function renderBatchResults(results, imageUrls = previewUrls) {
      const avg = results.reduce((sum, item) => sum + item.prediction.confidence, 0) / Math.max(results.length, 1);
      doneCount.textContent = `${results.length} 张`;
      avgConfidence.textContent = formatPct(avg);

      resultList.innerHTML = results.map((item, index) => {
        const top = item.prediction;
        const display = describePrediction(top);
        const imageUrl = imageUrls[index] || "";
        return `
          <article class="resultCard">
            <img class="resultImage" src="${imageUrl}" alt="${escapeHtml(item.filename)}">
            <div class="resultBody">
              <div class="resultTop">
                <div>
                  <div class="fileName" title="${escapeHtml(item.filename)}">${escapeHtml(item.filename)}</div>
                  <div class="winnerName">${escapeHtml(display.label)}</div>
                  <div class="winnerCode">${escapeHtml(display.code)}</div>
                </div>
                <div class="scorePill">${formatPct(top.confidence)}</div>
              </div>
              <div class="bars">${renderBars(item.top_k)}</div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function predictBatch() {
      if (!selectedFiles.length) return;

      setBusyState(true);
      predictButton.textContent = "识别中";
      message.textContent = `正在识别 ${selectedFiles.length} 张图片，请稍等。`;

      const form = new FormData();
      selectedFiles.forEach(file => form.append("files", file));

      try {
        const res = await fetch("/predict-batch?top_k=3", { method: "POST", body: form });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || "批量识别失败");
        }
        const data = await res.json();
        renderBatchResults(data.results);
        message.textContent = `已完成 ${data.count} 张图片识别。`;
      } catch (err) {
        message.innerHTML = `<span class="error">${escapeHtml(err.message)}</span>`;
      } finally {
        setBusyState(false);
        predictButton.textContent = "批量识别";
      }
    }

    async function predictFromUrl() {
      const imageUrl = normalizeImageUrl(imageUrlInput.value);
      if (!imageUrl) {
        message.innerHTML = "<span class='error'>请先粘贴图片链接。</span>";
        return;
      }

      setBusyState(true);
      predictUrlButton.textContent = "识别中...";
      selectedCount.textContent = "1 张";
      doneCount.textContent = "0 张";
      avgConfidence.textContent = "--";
      message.textContent = "正在下载并识别链接图片，请稍等。";

      try {
        const res = await fetch("/predict-url?top_k=3", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image_url: imageUrl })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || "链接图片识别失败");
        }
        const data = await res.json();
        renderBatchResults([data], [imageUrl]);
        message.textContent = "链接图片识别完成。";
      } catch (err) {
        message.innerHTML = `<span class="error">${escapeHtml(err.message)}</span>`;
      } finally {
        setBusyState(false);
        predictUrlButton.textContent = "识别链接图片";
      }
    }

    fileInput.addEventListener("change", () => setFiles(fileInput.files));
    chooseButton.addEventListener("click", openPicker);
    clearButton.addEventListener("click", clearFiles);
    imageUrlInput.addEventListener("input", syncUrlButtonState);
    imageUrlInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        predictFromUrl();
      }
    });
    drop.addEventListener("click", openPicker);
    drop.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        openPicker();
      }
    });
    predictButton.addEventListener("click", predictBatch);
    predictUrlButton.addEventListener("click", predictFromUrl);
    thresholdSave.addEventListener("click", saveThreshold);
    thresholdInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        saveThreshold();
      }
    });

    ["dragenter", "dragover"].forEach(name => {
      drop.addEventListener(name, event => {
        event.preventDefault();
        drop.classList.add("drag");
      });
    });

    ["dragleave", "drop"].forEach(name => {
      drop.addEventListener(name, event => {
        event.preventDefault();
        drop.classList.remove("drag");
      });
    });

    drop.addEventListener("drop", event => setFiles(event.dataTransfer.files));

    renderClassRail();
    syncUrlButtonState();
    loadHealth();
  </script>
</body>
</html>
